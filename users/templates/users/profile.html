<!-- # Flow: urls.py -> views.py -> templates -->
<!-- This is the profile page for the users app -->
 <!-- Content of the page -->
{% extends 'posts/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="main-container">
        <div class="topbar">
            <h1 class="title">Edit your Profile</h1>
        </div>

        <form method="post">
            {% csrf_token%}
            {{form|crispy}}
            <button type="submit" class="btn btn-primary">Submit Profile Info</button>

        </form>
        


    </div>

{% endblock %}
