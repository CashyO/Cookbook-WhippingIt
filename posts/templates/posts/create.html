<!-- # Flow: urls.py -> views.py -> templates -->
<!-- This is the create page for the posts app -->
 <!-- Content of the page -->
{% extends 'posts/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="form-page">
    <div class="page-header-card">
        <div>
            <h1 class="page-title">Create a Recipe Post</h1>
            <p class="page-subtitle">Share a new recipe with your cookbook community.</p>
        </div>
    </div>

    <div class="form-card">
        <form method="post" enctype="multipart/form-data" class="recipe-form">
            {% csrf_token %}
            {{ form|crispy }}

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-pill">Submit Recipe</button>
                <a href="{% url 'recipeposts' %}" class="btn btn-outline-secondary btn-pill">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
