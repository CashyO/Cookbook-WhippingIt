<!-- # Flow: urls.py -> views.py -> templates -->
<!-- This is the base boilerplate code for all pages in the posts app -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whipping It</title>

    <link rel="stylesheet" href="{% static 'posts/main.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
</head>
<body class="site-body">

    <nav class="site-navbar">
        <div class="site-navbar-inner">
            <div class="site-navbar-logo">
                <a href="{% url 'home' %}">
                    <img class="logo" src="{% static 'posts/WhippingIt-Logo-v1.png' %}" alt="Whipping It logo">
                </a>
            </div>

            <ul class="site-navbar-links">
                <li>
                    <a href="{% url 'home' %}" class="{% if request.path == '/' %}active{% endif %}">Home</a>
                </li>

                {% if user.is_authenticated %}
                    <li>
                        <a href="{% url 'recipeposts' %}" class="{% if request.path == '/recipeposts' %}active{% endif %}">
                            My recipe posts
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'profile' %}" class="{% if request.path == '/users/profile' %}active{% endif %}">
                            {{ user.username }}
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'logoutconfirm' %}" class="{% if request.path == '/users/confirm/logout' %}active{% endif %}">
                            Log Out
                        </a>
                    </li>
                {% else %}
                    <li>
                        <a href="{% url 'signup' %}" class="{% if request.path == '/users/signup' %}active{% endif %}">
                            Sign Up
                        </a>
                    </li>
                    <li>
                        <a href="{% url 'login' %}" class="{% if request.path == '/users/login' %}active{% endif %}">
                            Log In
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <main class="site-main">
        <div class="page-shell">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</body>
</html>
